# =============================================================================
# tmux configuration
# =============================================================================

# -----------------------------------------------------------------------------
# General settings
# -----------------------------------------------------------------------------
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
set -g mouse off
setw -g mode-keys vi

# Enable true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -sg escape-time 10
set -g focus-events on
set -g detach-on-destroy off

# Automatically renumber windows
set -g renumber-windows on

# -----------------------------------------------------------------------------
# Prefix key
# -----------------------------------------------------------------------------
unbind C-b
bind C-a send-prefix

# -----------------------------------------------------------------------------
# Pane and window management
# -----------------------------------------------------------------------------
# New window in current path
bind c new-window -c "#{pane_current_path}"

# Split windows in current path
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind -r v copy-mode

# -----------------------------------------------------------------------------
# vim-tmux-navigator
# -----------------------------------------------------------------------------
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# -----------------------------------------------------------------------------
# Catppuccin theme
# -----------------------------------------------------------------------------
set -g @catppuccin_flavour 'mocha'
run-shell '/run/current-system/sw/share/tmux-plugins/catppuccin/tmux/catppuccin.tmux'

# -----------------------------------------------------------------------------
# Resurrect plugin
# -----------------------------------------------------------------------------
resurrect_dir="$HOME/.tmux/resurrect"
set -g @resurrect-dir $resurrect_dir
set -g @resurrect-hook-post-save-all 'target=$(readlink -f $resurrect_dir/last); sed "s| --cmd .*-vim-pack-dir||g; s|/etc/profiles/per-user/$USER/bin/||g; s|/home/$USER/.nix-profile/bin/||g" $target | sponge $target'
set -g @resurrect-processes 'nvim htop nvtop neomutt'
run-shell '/run/current-system/sw/share/tmux-plugins/resurrect/resurrect.tmux'

# -----------------------------------------------------------------------------
# Continuum plugin
# -----------------------------------------------------------------------------
set -g @continuum-restore 'on'
run-shell '/run/current-system/sw/share/tmux-plugins/continuum/continuum.tmux'