  cache:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "holster"

      - name: Create nix daemon tmpdir path
        run: |
          sudo mkdir -p /nix/tmpdir
          sudo chown "$(whoami)" /nix/tmpdir

      - name: Install nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GH_PRIVATE_REPO_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-experimental-features = nix-command flakes
            log-lines = 50
            build-dir = /nix/tmpdir

      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: cachix/cachix-action@v17
        with:
          name: volodiapg
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Build to cache
        run: |
          set -euxo pipefail
          nix build --accept-flake-config .#nixosConfigurations.m1.config.system.build.toplevel
