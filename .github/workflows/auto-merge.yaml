name: Auto Merge Dependency Updates
on:
  - pull_request_target
jobs:
  check:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - config: m1
            runner: ubuntu-24.04-arm
          - config: home-server
            runner: ubuntu-24.04
          - config: dell
            runner: ubuntu-24.04
    steps:
      - uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            lazy-trees = true

      - name: Set up FlakeHub Cache and local cache
        uses: DeterminateSystems/flakehub-cache-action@main

      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run nix eval for ${{ matrix.config }}
        run: nix eval .#nixosConfigurations.${{ matrix.config }}.config.system.build.toplevel

  auto-merge-dependency-updates:
    needs: check
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: "auto-merge:${{ github.head_ref }}"
      cancel-in-progress: true
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_PRIVATE_KEY }}

      - uses: Mic92/auto-merge@main
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
