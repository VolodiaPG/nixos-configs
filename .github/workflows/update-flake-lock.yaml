name: update-flake-lock
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    # Winter time (CEST, UTC+1)
    - cron: "30 15 * 10-12 *" # October to December
    - cron: "30 15 * 1-3 *" # January to March at
    # Summer time (CEST, UTC+2)
    - cron: "30 14 * 4-9 *" # April to September

jobs:
  lockfile:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "holster"

      - name: Create nix daemon tmpdir path
        run: |
          sudo mkdir -p /nix/tmpdir
          sudo chown "$(whoami)" /nix/tmpdir

      - name: Install nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GH_PRIVATE_REPO_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-experimental-features = nix-command flakes
            log-lines = 50
            build-dir = /nix/tmpdir

      - uses: cachix/cachix-action@v17
        with:
          name: volodiapg
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build nix packages
        run: |
          nix flake update
          nix develop .#ci --command nvfetcher

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          title: "chore(update): Update packages" # Title of PR to be created
          labels: | # Labels to be set on the PR
            dependencies
            automated
            auto-merge
